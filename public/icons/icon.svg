<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#1a1a1a"/>
  <rect x="10" y="10" width="492" height="492" rx="100" fill="none" stroke="#c9a84c" stroke-width="16"/>
  <!-- Scissors blades -->
  <g fill="#c9a84c">
    <!-- Left blade -->
    <ellipse cx="185" cy="200" rx="18" ry="70" transform="rotate(-35 185 200)"/>
    <!-- Right blade -->
    <ellipse cx="327" cy="200" rx="18" ry="70" transform="rotate(35 327 200)"/>
    <!-- Pivot -->
    <circle cx="256" cy="245" r="18"/>
    <!-- Handles left -->
    <ellipse cx="185" cy="340" rx="38" ry="22" transform="rotate(-35 185 340)" fill="none" stroke="#c9a84c" stroke-width="18"/>
    <!-- Handles right -->
    <ellipse cx="327" cy="340" rx="38" ry="22" transform="rotate(35 327 340)" fill="none" stroke="#c9a84c" stroke-width="18"/>
    <!-- Handle rods -->
    <rect x="155" y="258" width="18" height="70" rx="9" transform="rotate(-35 164 293)"/>
    <rect x="339" y="258" width="18" height="70" rx="9" transform="rotate(35 348 293)"/>
  </g>
  <!-- Shop name -->
  <text x="256" y="430" font-size="52" font-family="Arial, sans-serif" font-weight="bold" fill="#c9a84c" text-anchor="middle">בבאני</text>
</svg>
